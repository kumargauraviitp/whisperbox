<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons (browser tab / bookmark bar) -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- PWA manifest (declared explicitly; vite-plugin-pwa also injects at build) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS home-screen / "Add to Home Screen" support -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WhisperBox" />

    <!-- macOS Safari pinned-tab icon (must be single-color SVG) -->
    <link rel="mask-icon" href="/mask-icon.svg" color="#00f2ff" />

    <!-- Browser / OS chrome theming -->
    <meta name="theme-color" content="#0a0a0f" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>WhisperBox — Anonymous Messages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
